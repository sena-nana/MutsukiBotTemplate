# Copy this file to config/local.toml and edit only the product values below.
# Host runtime, directory, IPC, runner and observe settings use safe defaults.

[service]
profile = "bot"
instance_id = "mutsuki-bot"

[security]
secret_file = "local.secret.toml"

[[plugins.configured]]
id = "mutsuki.bot.router.event"

[plugins.configured.config]
subscriptions = [
  { subscription_id = "qq-command", handler_protocol_id = "mutsuki.bot.command/parse@1", platform = "qqbot", event_kind = "message_created" },
]

[[plugins.configured]]
id = "mutsuki.bot.command"

[plugins.configured.config]
prefixes = ["/"]

[[plugins.configured]]
id = "mutsuki.bot.adapter.qqbot"

[plugins.configured.config]
account_id = "qqbot-main"
app_id = "replace-with-app-id"
client_secret_key = "QQBOT_CLIENT_SECRET"
