account_id = "replace-with-account-id"
app_id = "replace-with-app-id"
client_secret_key = "QQBOT_CLIENT_SECRET"
intents = 1325405185

[transport]
token_url = "https://bots.qq.com/app/getAppAccessToken"
openapi_base_url = "https://api.sgroup.qq.com"
request_timeout_ms = 15000
connect_timeout_ms = 10000
response_body_limit_bytes = 2097152
token_refresh_margin_secs = 120
max_retry_attempts = 3
retry_base_delay_ms = 250
retry_max_delay_ms = 5000

[gateway]
shard = [0, 1]
hello_timeout_ms = 15000
ack_timeout_ms = 10000
queue_capacity = 128
dedup_window = 2048
reconnect_initial_delay_ms = 500
reconnect_max_delay_ms = 30000
reconnect_jitter_ms = 250
rate_limit_delay_ms = 60000
