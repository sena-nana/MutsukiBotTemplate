schema_version = 2
distributed_host_release = "mutsuki-distributed-host-clustered-mvp-1"
capability_level = "deployable"
required_features = ["local_observation", "clustered", "high_availability"]
policy_catalog = "task-policies.toml"

[external_service]
artifact = "mutsuki-distributed-host"
revision = "80ce156bcf633a560e117ebfc8946dfa7c932215"
local_host_control_endpoint = "servicehost://local/control"
sidecar_control_endpoint = "link-local://mutsuki-distributed-management"
sidecar_control_client_node = "mutsuki-bot-template"
control_secret_key = "MUTSUKI_DISTRIBUTED_CONTROL_KEY"
identity_secret_key = "MUTSUKI_DISTRIBUTED_IDENTITY_KEY"

[topology]
kind = "ha_three_voters_worker"

[[topology.nodes]]
id = "controller-a"
roles = ["voter"]

[[topology.nodes]]
id = "controller-b"
roles = ["voter"]

[[topology.nodes]]
id = "controller-c"
roles = ["voter"]

[[topology.nodes]]
id = "worker-a"
roles = ["worker"]

[channels.control]
endpoint = "tls://controllers.example.invalid:4601"
authenticated = true
encrypted = true

[channels.data]
endpoint = "quic://workers.example.invalid:4701"
authenticated = true
encrypted = true
direct_worker_transfer = true
leader_proxy = false

[budgets]
cpu_units = 16
memory_bytes = 34359738368
vram_bytes = 17179869184
network_bytes_per_second = 268435456
transfer_concurrency = 16
checkpoint_bytes_per_second = 67108864

[observability]
local_service_health = "servicehost://local/health"
cluster_health_endpoint = "tls://controllers.example.invalid:4601/health"
