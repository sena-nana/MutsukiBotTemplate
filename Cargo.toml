[workspace]
members = ["crates/example-bot"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
mutsuki-runtime-contracts = { path = "../MutsukiCore/crates/mutsuki-runtime-contracts" }
mutsuki-runtime-core = { path = "../MutsukiCore/crates/mutsuki-runtime-core" }
mutsuki-runtime-host = { path = "../MutsukiCore/crates/mutsuki-runtime-host" }
mutsuki-runtime-sdk = { path = "../MutsukiCore/crates/mutsuki-runtime-sdk" }
mutsuki-service-config = { path = "../MutsukiServiceHost/crates/mutsuki-service-config" }
mutsuki-service-runtime = { path = "../MutsukiServiceHost/crates/mutsuki-service-runtime", default-features = false }
mutsuki-bot-protocol = { path = "../MutsukiBotPlugins/crates/mutsuki-bot-protocol" }
mutsuki-bot-sdk = { path = "../MutsukiBotPlugins/crates/mutsuki-bot-sdk" }
mutsuki-plugin-bot-adapter-qqbot = { path = "../MutsukiBotPlugins/crates/mutsuki-plugin-bot-adapter-qqbot" }
mutsuki-plugin-bot-command = { path = "../MutsukiBotPlugins/crates/mutsuki-plugin-bot-command" }
mutsuki-plugin-bot-event-router = { path = "../MutsukiBotPlugins/crates/mutsuki-plugin-bot-event-router" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
toml = "0.8"

[profile.dev]
debug = "line-tables-only"
incremental = true
