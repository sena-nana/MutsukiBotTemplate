[workspace]
members = ["crates/example-bot"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
mutsuki-runtime-contracts = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-runtime-core = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-runtime-host = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-runtime-sdk = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-service-config = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "57cdd92f23f345c4c6a6cffcc78a1cd81175098a" }
mutsuki-service-runtime = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "57cdd92f23f345c4c6a6cffcc78a1cd81175098a", default-features = false }
mutsuki-service-control = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "57cdd92f23f345c4c6a6cffcc78a1cd81175098a" }
mutsuki-service-ipc = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "57cdd92f23f345c4c6a6cffcc78a1cd81175098a" }
mutsuki-bot-protocol = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-bot-sdk = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-plugin-bot-adapter-qqbot = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-bot-service-host-integration = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-plugin-bot-command = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-plugin-bot-event-router = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-bot-testkit = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "58f365dbe7d8ca6e7e5c10d92a6d99e7c13ad7f0" }
mutsuki-agent-bundle = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "25058eb6c68bd7d976c79f668a1623c2d047e5ab" }
mutsuki-agent-protocol = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "25058eb6c68bd7d976c79f668a1623c2d047e5ab" }
mutsuki-agent-sdk = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "25058eb6c68bd7d976c79f668a1623c2d047e5ab" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
toml = "0.8"
tempfile = "3"

[profile.dev]
debug = "line-tables-only"
incremental = true
