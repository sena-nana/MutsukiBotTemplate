[workspace]
members = ["crates/mutsuki-bot"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
mutsuki-service-config = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "5990d7d7706e749b17a0893080c0790e173a2947" }
mutsuki-service-runtime = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "5990d7d7706e749b17a0893080c0790e173a2947", default-features = false }
mutsuki-service-control = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "5990d7d7706e749b17a0893080c0790e173a2947" }
mutsuki-service-ipc = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "5990d7d7706e749b17a0893080c0790e173a2947" }
mutsuki-plugin-bot-adapter-qqbot = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "4ae00c560ded1c3ac0f773bddac11429788a8e0e" }
mutsuki-bot-service-host-integration = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "4ae00c560ded1c3ac0f773bddac11429788a8e0e" }
mutsuki-bot-testkit = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "4ae00c560ded1c3ac0f773bddac11429788a8e0e" }
serde_json = "1.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
tempfile = "3"

[profile.dev]
debug = "line-tables-only"
incremental = true
