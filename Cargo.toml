[workspace]
members = ["crates/mutsuki-bot"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
mutsuki-service-config = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "c5cab43559a5ed5af9be8513e4669a9eab9019fb" }
mutsuki-service-runtime = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "c5cab43559a5ed5af9be8513e4669a9eab9019fb", default-features = false }
mutsuki-service-control = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "c5cab43559a5ed5af9be8513e4669a9eab9019fb" }
mutsuki-service-ipc = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "c5cab43559a5ed5af9be8513e4669a9eab9019fb" }
mutsuki-service-plugin-loader = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "c5cab43559a5ed5af9be8513e4669a9eab9019fb" }
mutsuki-service-abi-fixture = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "c5cab43559a5ed5af9be8513e4669a9eab9019fb" }
mutsuki-plugin-bot-adapter-qqbot = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "0c35e2fd55cd8313bc8a6db61d6f56b597570e97" }
mutsuki-bot-service-host-integration = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "0c35e2fd55cd8313bc8a6db61d6f56b597570e97" }
mutsuki-bot-testkit = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "0c35e2fd55cd8313bc8a6db61d6f56b597570e97" }
serde_json = "1.0"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
tempfile = "3"
toml = "0.8"

[profile.dev]
debug = "line-tables-only"
incremental = true
