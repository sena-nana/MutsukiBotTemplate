[workspace]
members = ["crates/mutsuki-bot"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
mutsuki-distributed-contracts = { git = "https://github.com/sena-nana/MutsukiDistributedHost.git", rev = "eb03f14cce5440b23c3a4f369841456fecffa1c3" }
mutsuki-distributed-control-client = { git = "https://github.com/sena-nana/MutsukiDistributedHost.git", rev = "eb03f14cce5440b23c3a4f369841456fecffa1c3" }
mutsuki-service-config = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "a5b763ac1cad026b66f0b8d526cc8dd58ee74409" }
mutsuki-service-runtime = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "a5b763ac1cad026b66f0b8d526cc8dd58ee74409", default-features = false }
mutsuki-service-control = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "a5b763ac1cad026b66f0b8d526cc8dd58ee74409" }
mutsuki-service-ipc = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "a5b763ac1cad026b66f0b8d526cc8dd58ee74409" }
mutsuki-service-plugin-loader = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "a5b763ac1cad026b66f0b8d526cc8dd58ee74409" }
mutsuki-plugin-bot-adapter-qqbot = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "2a68cb703c16dc0799d63dd9ab2c709ed07710af" }
mutsuki-plugin-bot-command = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "2a68cb703c16dc0799d63dd9ab2c709ed07710af" }
mutsuki-bot-service-host-integration = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "2a68cb703c16dc0799d63dd9ab2c709ed07710af" }
mutsuki-bot-testkit = { git = "https://github.com/sena-nana/MutsukiBotPlugins.git", rev = "2a68cb703c16dc0799d63dd9ab2c709ed07710af" }
mutsuki-std-plugins = { git = "https://github.com/sena-nana/MutsukiStdPlugins.git", rev = "57c4b485708826f4e5a4499ea4ae47c3950ed8b1" }
mutsuki-agent-bundle = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "dfdf12fd85f540d41d15f9cd26224301be8977f0" }
mutsuki-agent-protocol = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "dfdf12fd85f540d41d15f9cd26224301be8977f0" }
mutsuki-agent-sdk = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "dfdf12fd85f540d41d15f9cd26224301be8977f0" }
mutsuki-plugin-agent-model-gateway = { git = "https://github.com/sena-nana/MutsukiAgentKit.git", rev = "dfdf12fd85f540d41d15f9cd26224301be8977f0" }
mutsuki-runtime-contracts = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "36f123a677050b4715b9d3053532245f082ca4ab" }
mutsuki-runtime-sdk = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "36f123a677050b4715b9d3053532245f082ca4ab" }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
tempfile = "3"
toml = "0.8"

[profile.dev]
debug = "line-tables-only"
incremental = true
